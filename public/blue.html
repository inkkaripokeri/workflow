<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blue Controller</title>

<style>
body {
  background: blue;
  margin: 0;
  font-family: Arial;
}

button {
  width: 100%;
  padding: 20px;
  margin: 10px 0;
  font-size: 20px;
}
</style>
</head>

<body>

<button onclick="shoot('A')">Blue A</button>
<button onclick="shoot('B')">Blue B</button>
<button onclick="shoot('C')">Blue C</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function shoot(letter) {
  socket.emit("shoot", { color: "blue", letter });
}
</script>

</body>
</html>
