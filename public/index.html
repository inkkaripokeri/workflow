<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taskflow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
}

/* ===== SCREENS ===== */
.screen {
  display: none;
}

.active {
  display: block;
}

/* ===== START ===== */
#start-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;   /* FIX: vertical layout */
  align-items: center;
  justify-content: center;
  gap: 30px;
}

#start-screen img {
  width: 420px;
  max-width: 90%;
}

/* ===== LOBBY ===== */
#lobby-screen {
  padding: 40px 60px;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header img {
  max-width: 420px;
}

/* QR */
.qr {
  text-align: center;
  margin-bottom: 20px;
}

.qr img {
  width: 140px;
}

/* titles */
.section-title {
  font-size: 22px;
  margin: 20px 0 10px;
  opacity: 0.9;
}

/* steps */
.steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
  margin-bottom: 20px;
}

.step {
  position: relative;
  padding-right: 24px;
}

.step:not(:last-child)::after {
  content: "";
  position: absolute;
  top: 10px;
  right: 0;
  height: 90%;
  border-right: 2px dashed rgba(255,255,255,0.6);
}

.step-number {
  color: #ff8c00;
  font-size: 32px;
  font-weight: 700;
}

.step-title {
  font-size: 20px;
  font-weight: 700;
}

/* Game ID FIX VISIBILITY */
.game-id {
  font-size: 20px;
  margin-top: 6px;
  opacity: 0.9;
}

/* players */
.players {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
  margin-top: 20px;
}

.player {
  text-align: center;
  position: relative;
}

.player img {
  width: 140px;
  border-radius: 16px;
}

/* status icon FIX */
.status-icon {
  position: absolute;
  top: 8px;
  right: 18px;
  width: 30px;
  height: 30px;
  object-fit: contain; /* FIX no stretching */
}

/* name */
.player-name {
  margin-top: 10px;
  font-weight: 700;
}

/* waiting animation */
.waiting {
  opacity: 0.8;
}

.dots::after {
  content: "";
  display: inline-block;
  animation: dots 1.2s infinite;
}

@keyframes dots {
  0% { content: ""; }
  33% { content: "."; }
  66% { content: ".."; }
  100% { content: "..."; }
}

/* BUTTON */
.button {
  margin-top: 40px;
  padding: 18px 72px;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 2px;

  background: transparent;
  color: #fff;
  border: 3px solid #ff8c00;
  border-radius: 16px;
  cursor: pointer;
}

.button:disabled {
  opacity: 0.35;
}

.button:hover:not(:disabled) {
  background: rgba(255,140,0,0.15);
}
</style>
</head>

<body>

<!-- ===== START ===== -->
<div id="start-screen" class="screen active">
  <img src="logo_taskflow.png">
  <button class="button" id="startContinue">Continue</button>
</div>

<!-- ===== LOBBY ===== -->
<div id="lobby-screen" class="screen">

  <div class="header">
    <img src="logo_taskflow.png">
  </div>

  <!-- QR FIXED -->
  <div class="qr">
    <img src="taskflow_mobile_url.png">
  </div>

  <div class="section-title">How to Join</div>

  <div class="steps">
    <div class="step">
      <div class="step-number">1.</div>
      <div class="step-title">Scan QR</div>
    </div>

    <div class="step">
      <div class="step-number">2.</div>
      <div class="step-title">Choose Role</div>
    </div>

    <div class="step">
      <div class="step-number">3.</div>
      <div class="step-title">Enter Game ID</div>
      <div class="game-id" id="gameId">----</div>
    </div>

    <div class="step">
      <div class="step-number">4.</div>
      <div class="step-title">Join</div>
    </div>
  </div>

  <div class="section-title">Players</div>

  <div class="players" id="players"></div>

  <button class="button" id="lobbyContinue" disabled>
    CONTINUE
  </button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let lobby = null;

/* NAV */
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* START FIX */
document.getElementById("startContinue").onclick = () => {
  show("lobby-screen");
  socket.emit("resetLobby");
};

/* STATE */
socket.on("state", (s) => {
  lobby = s.lobby;

  document.getElementById("gameId").textContent = lobby.code;

  const count = Object.values(lobby.players).filter(Boolean).length;
  document.getElementById("lobbyContinue").disabled = count !== 3;

  updatePlayers(lobby.players);
});

/* PLAYERS UI FIX */
function updatePlayers(p) {
  document.getElementById("players").innerHTML = `
    <div class="player">
      <img src="designer.png">
      <img class="status-icon" src="${p.designer ? "Connected_icon.png" : "Disconnected_Icon.png"}">
      <div class="player-name">Designer<br><span class="waiting">${p.designer ? p.designer.name : "Waiting"}<span class="dots"></span></span></div>
    </div>

    <div class="player">
      <img src="developer.png">
      <img class="status-icon" src="${p.developer ? "Connected_icon.png" : "Disconnected_Icon.png"}">
      <div class="player-name">Developer<br><span class="waiting">${p.developer ? p.developer.name : "Waiting"}<span class="dots"></span></span></div>
    </div>

    <div class="player">
      <img src="testengineer.png">
      <img class="status-icon" src="${p.tester ? "Connected_icon.png" : "Disconnected_Icon.png"}">
      <div class="player-name">Test Engineer<br><span class="waiting">${p.tester ? p.tester.name : "Waiting"}<span class="dots"></span></span></div>
    </div>
  `;
}
</script>

</body>
</html>
