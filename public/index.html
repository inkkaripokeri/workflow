<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taskflow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
}

/* ===== START ===== */
#start-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#start-screen img {
  width: 420px;
  max-width: 90%;
}

/* ===== LOBBY ===== */
#lobby-screen {
  display: none;
  padding: 40px 60px;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.header img {
  max-width: 420px;
}

/* steps */
.steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
}

.step {
  position: relative;
  padding-right: 24px;
}

.step:not(:last-child)::after {
  content: "";
  position: absolute;
  top: 10px;
  right: 0;
  height: 90%;
  border-right: 2px dashed rgba(255,255,255,0.6);
}

.step-number {
  color: #ff8c00;
  font-size: 32px;
  font-weight: 700;
}

.step-title {
  font-size: 20px;
  font-weight: 700;
}

/* players */
.players {
  display: grid;
  grid-template-columns: repeat(3, 1fr) auto;
  gap: 40px;
  margin-top: 40px;
}

.player {
  text-align: center;
}

.player img {
  width: 140px;
  border-radius: 16px;
}

.player-name {
  margin-top: 10px;
  font-weight: 700;
}

.continue-wrapper {
  align-self: center;
}

/* ===== GAME ===== */
#game-screen {
  display: none;
  text-align: center;
}

canvas {
  display: block;
  margin-top: 20px;
}

/* ===== BUTTON ===== */
.button {
  margin-top: 40px;
  padding: 18px 72px;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;

  background: transparent;
  color: #fff;
  border: 3px solid #ff8c00;
  border-radius: 16px;
  cursor: pointer;
}

.button:hover:not(:disabled) {
  background: rgba(255,140,0,0.15);
}

.button:disabled {
  opacity: 0.35;
}

/* GAME OVER */
#gameover {
  display: none;
  font-size: 48px;
  margin-top: 40px;
}
</style>
</head>

<body>

<!-- ===== START ===== -->
<div id="start-screen">
  <img src="logo_taskflow.png">
  <button class="button" id="startContinue">Continue</button>
</div>

<!-- ===== LOBBY ===== -->
<div id="lobby-screen">

  <div class="header">
    <img src="logo_taskflow.png">
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-number">1.</div>
      <div class="step-title">Scan QR</div>
    </div>

    <div class="step">
      <div class="step-number">2.</div>
      <div class="step-title">Choose Role</div>
    </div>

    <div class="step">
      <div class="step-number">3.</div>
      <div class="step-title">Enter Game ID</div>
      <div id="gameId">----</div>
    </div>

    <div class="step">
      <div class="step-number">4.</div>
      <div class="step-title">Join</div>
    </div>
  </div>

  <div class="players" id="players"></div>

  <div class="continue-wrapper">
    <button class="button" id="lobbyContinue" disabled>Start Game</button>
  </div>

</div>

<!-- ===== GAME ===== -->
<div id="game-screen">
  <img src="logo_taskflow.png">
  <canvas id="game"></canvas>
  <div id="gameover">GAME OVER</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let state = null;

/* ===== SCREEN SWITCH ===== */
function showScreen(screen) {
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("lobby-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "none";

  document.getElementById(screen).style.display =
    screen === "start-screen" ? "flex" : "block";
}

/* ===== START ===== */
document.getElementById("startContinue").onclick = () => {
  showScreen("lobby-screen");
  socket.emit("resetLobby");
};

/* ===== START GAME ===== */
document.getElementById("lobbyContinue").onclick = () => {
  socket.emit("start");
};

/* ===== STATE FROM SERVER ===== */
socket.on("state", (s) => {
  state = s;

  document.getElementById("gameId").textContent = s.lobby.code;

  updatePlayers(s.lobby.players);

  const count = Object.values(s.lobby.players).filter(Boolean).length;
  document.getElementById("lobbyContinue").disabled = count !== 3;

  // 👉 GAME STATE HANDLING
  if (s.gameState === "running") {
    showScreen("game-screen");
    startGame();
  }

  if (s.gameState === "gameover") {
    showScreen("game-screen");
    document.getElementById("gameover").style.display = "block";
  }
});

/* ===== PLAYERS UI ===== */
function updatePlayers(players) {
  document.getElementById("players").innerHTML = `
    <div class="player">
      <img src="designer.png">
      <div class="player-name">
        Designer<br>${players.designer ? players.designer.name : "❌"}
      </div>
    </div>

    <div class="player">
      <img src="developer.png">
      <div class="player-name">
        Developer<br>${players.developer ? players.developer.name : "❌"}
      </div>
    </div>

    <div class="player">
      <img src="testengineer.png">
      <div class="player-name">
        Test Engineer<br>${players.tester ? players.tester.name : "❌"}
      </div>
    </div>
  `;
}

/* ===== GAME CANVAS ===== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COUNT = 14;
const weekdays = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight * 0.6;
}
window.addEventListener("resize", resize);

function drawRoundedRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const margin = canvas.width * 0.02;
  const usableWidth = canvas.width * 0.96;

  const gapRatio = 0.10;
  const boxWidth = usableWidth / (COUNT + gapRatio * (COUNT - 1));
  const gap = boxWidth * gapRatio;
  const boxHeight = boxWidth * 0.5;

  const startY = canvas.height * 0.3;

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for(let i=0;i<COUNT;i++){
    const x = margin + i*(boxWidth+gap);
    const y = startY;
    const cx = x + boxWidth/2;

    ctx.fillStyle="#fff";
    ctx.fillText(weekdays[i%7],cx,y-20);

    drawRoundedRect(x,y,boxWidth,boxHeight,8);
    ctx.fillStyle="#66ff88";
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

function startGame(){
  resize();
  draw();
}
</script>

</body>
</html>
