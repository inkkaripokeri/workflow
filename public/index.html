<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taskflow</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- START -->
<div id="start-screen" class="screen active">
  <img src="logo_taskflow.png">
  <button class="button" id="startBtn">CONTINUE</button>
</div>

<!-- LOBBY -->
<div id="lobby-screen" class="screen">

  <div class="header">
    <img src="logo_taskflow.png">
  </div>
  <div class="section-title">How to Join</div>
  <div class="steps">

  <div class="step">
    <div class="step-header">
      <div class="step-number">1.</div>
      <div class="step-title">Scan the QR Code</div>
      <img src="taskflow_mobile_url.png" class="qr">
    </div>
  </div>

  <div class="step-divider"></div>

  <div class="step">
    <div class="step-header">
      <div class="step-number">2.</div>
      <div class="step-title">Select Your Role</div>
      <div class="step-text">Developer, Designer, Test Engineer</div>
    </div>
  </div>

  <div class="step-divider"></div>

  <div class="step">
    <div class="step-header">
      <div class="step-number">3.</div>
      <div class="step-title">Enter Game ID</div>
      <div id="gameId" class="game-id">----</div>
    </div>
  </div>

  <div class="step-divider"></div>

  <div class="step">
    <div class="step-header">
      <div class="step-number">4.</div>
      <div class="step-title">Tap Join to Play</div>
    </div>
  </div>

</div>

  <div class="players">
    <h2>Players</h2>

    <div id="playersGrid" class="player-grid"></div>

    <div class="continue-wrapper">
      <button id="lobbyBtn" class="button" disabled>CONTINUE</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module" src="js/socket.js"></script>

</body>
</html>
