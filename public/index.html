<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taskflow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
}

/* ===== SCREENS ===== */
.screen {
  display: none;
}

.screen.active {
  display: block;
}

/* ===== START ===== */
#start-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

#start-screen img {
  width: 420px;
  max-width: 90%;
}

/* ===== LOBBY ===== */
#lobby-screen {
  padding: 40px 60px;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header img {
  max-width: 420px;
}

.section-title {
  font-size: 22px;
  margin: 20px 0 10px;
  opacity: 0.9;
}

/* QR */
.qr {
  text-align: center;
  margin-bottom: 20px;
}

.qr img {
  width: 180px;
}

/* steps */
.steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
  margin-bottom: 30px;
}

.step {
  position: relative;
  padding-right: 24px;
}

.step:not(:last-child)::after {
  content: "";
  position: absolute;
  top: 10px;
  right: 0;
  height: 90%;
  border-right: 2px dashed rgba(255,255,255,0.6);
}

.step-number {
  color: #ff8c00;
  font-size: 32px;
  font-weight: 700;
}

.step-title {
  font-size: 20px;
  font-weight: 700;
}

/* players */
.players {
  display: grid;
  grid-template-columns: repeat(3, 1fr) auto;
  gap: 40px;
  margin-top: 20px;
}

.player {
  text-align: center;
  position: relative;
}

.player img {
  width: 140px;
  border-radius: 16px;
}

.player-name {
  margin-top: 10px;
  font-weight: 700;
}

/* status text */
.waiting {
  font-size: 14px;
  opacity: 0.7;
}

/* icon */
.status-icon {
  position: absolute;
  top: -5px;
  right: -5px;
  width: 30px;
  height: 30px;
}

/* button */
.button {
  margin-top: 40px;
  padding: 18px 72px;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 2px;

  background: transparent;
  color: #fff;
  border: 3px solid #ff8c00;
  border-radius: 16px;
  cursor: pointer;
}

.button:disabled {
  opacity: 0.35;
}

.button:hover:not(:disabled) {
  background: rgba(255,140,0,0.15);
}

/* ===== GAME ===== */
#game-screen {
  display: none;
  text-align: center;
}
</style>
</head>

<body>

<!-- START -->
<div id="start-screen" class="screen active">
  <img src="logo_taskflow.png">
  <button class="button" id="startContinue">Continue</button>
</div>

<!-- LOBBY -->
<div id="lobby-screen" class="screen">

  <div class="header">
    <img src="logo_taskflow.png">
  </div>

  <div class="qr">
    <img src="taskflow_mobile_url.png">
  </div>

  <div class="section-title">How to Join</div>

  <div class="steps">
    <div class="step"><div class="step-number">1.</div><div class="step-title">Scan QR</div></div>
    <div class="step"><div class="step-number">2.</div><div class="step-title">Choose Role</div></div>
    <div class="step"><div class="step-number">3.</div><div class="step-title">Game ID</div></div>
    <div class="step"><div class="step-number">4.</div><div class="step-title">Join</div></div>
  </div>

  <div class="section-title">Players</div>

  <div class="players" id="players"></div>

  <button class="button" id="lobbyContinue" disabled>CONTINUE</button>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <h2>GAME</h2>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let lobby = null;
let inLobby = false;

/* =========================
   SCREEN CONTROL (FIXED)
========================= */
function show(id) {
  document.querySelectorAll(".screen").forEach(s => {
    s.classList.remove("active");
    s.style.display = "none";
  });

  const el = document.getElementById(id);
  el.classList.add("active");

  el.style.display = (id === "start-screen") ? "flex" : "block";
}

/* START */
document.getElementById("startContinue").onclick = () => {
  inLobby = true;
  socket.emit("resetLobby");
  show("lobby-screen");
};

/* CONTINUE */
document.getElementById("lobbyContinue").onclick = () => {
  show("game-screen");
};

/* =========================
   SOCKET STATE
   ========================= */
socket.on("state", (s) => {

  if (!inLobby) return;

  lobby = s.lobby;

  const count = Object.values(lobby.players).filter(Boolean).length;
  document.getElementById("lobbyContinue").disabled = count !== 3;

  updatePlayers(lobby.players);
});

/* =========================
   PLAYERS UI
========================= */
function updatePlayers(p) {
  document.getElementById("players").innerHTML = `
    ${card("designer", "Designer")}
    ${card("developer", "Developer")}
    ${card("tester", "Test Engineer")}
  `;

  function card(role, label) {
    const player = p[role];
    const connected = player && player.name;

    return `
      <div class="player">
        <img src="${role === "tester" ? "testengineer.png" : role + ".png"}">

        ${connected
          ? `<img class="status-icon" src="Connected_icon.png">`
          : `<img class="status-icon" src="Disconnected_Icon.png">`
        }

        <div class="player-name">${label}</div>

        <div class="waiting"></div>
      </div>
    `;
  }

  document.querySelectorAll(".waiting").forEach(el => {
    let i = 0;
    setInterval(() => {
      el.textContent = "Waiting" + ".".repeat(i % 4);
      i++;
    }, 500);
  });
}

</script>

</body>
</html>
