<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taskflow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
}

/* ===== SCREENS ===== */
.screen {
  display: none;
}

.active {
  display: block;
}

/* ===== START ===== */
#start-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#start-screen img {
  width: 420px;
  max-width: 90%;
}

/* ===== LOBBY ===== */
#lobby-screen {
  padding: 40px 60px;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.header img {
  max-width: 420px;
}

/* titles */
.section-title {
  font-size: 22px;
  margin: 20px 0 10px;
  opacity: 0.9;
}

/* steps */
.steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
  margin-bottom: 30px;
}

.step {
  position: relative;
  padding-right: 24px;
}

.step:not(:last-child)::after {
  content: "";
  position: absolute;
  top: 10px;
  right: 0;
  height: 90%;
  border-right: 2px dashed rgba(255,255,255,0.6);
}

.step-number {
  color: #ff8c00;
  font-size: 32px;
  font-weight: 700;
}

.step-title {
  font-size: 20px;
  font-weight: 700;
}

/* players */
.players {
  display: grid;
  grid-template-columns: repeat(3, 1fr) auto;
  gap: 40px;
  margin-top: 20px;
}

.player {
  text-align: center;
}

.player img {
  width: 140px;
  border-radius: 16px;
}

.player-name {
  margin-top: 10px;
  font-weight: 700;
}

/* ===== BUTTON ===== */
.button {
  margin-top: 40px;
  padding: 18px 72px;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;

  background: transparent;
  color: #fff;
  border: 3px solid #ff8c00;
  border-radius: 16px;
  cursor: pointer;
}

.button:disabled {
  opacity: 0.35;
}

.button:hover:not(:disabled) {
  background: rgba(255,140,0,0.15);
}

/* ===== PRE GAME ===== */
#pre-game {
  padding: 30px;
  text-align: center;
  display: none;
}

#instructions {
  margin-top: 20px;
  opacity: 0.9;
}

/* role buttons */
.role-buttons {
  display: none;
  margin-top: 30px;
}

.role-buttons button {
  margin: 10px;
  padding: 14px 30px;
  font-size: 18px;
  border-radius: 10px;
  border: 2px solid #ff8c00;
  background: transparent;
  color: white;
}

/* ===== GAME ===== */
#game-screen {
  display: none;
  text-align: center;
}

canvas {
  margin-top: 20px;
  display: block;
}
</style>
</head>

<body>

<!-- ===== START ===== -->
<div id="start-screen" class="screen active">
  <img src="logo_taskflow.png">
  <button class="button" id="startContinue">Continue</button>
</div>

<!-- ===== LOBBY ===== -->
<div id="lobby-screen" class="screen">

  <div class="header">
    <img src="logo_taskflow.png">
  </div>

  <div class="section-title">How to Join</div>

  <div class="steps">
    <div class="step">
      <div class="step-number">1.</div>
      <div class="step-title">Scan QR</div>
    </div>
    <div class="step">
      <div class="step-number">2.</div>
      <div class="step-title">Choose Role</div>
    </div>
    <div class="step">
      <div class="step-number">3.</div>
      <div class="step-title">Enter Game ID</div>
    </div>
    <div class="step">
      <div class="step-number">4.</div>
      <div class="step-title">Join</div>
    </div>
  </div>

  <div class="section-title">Players</div>

  <div class="players" id="players"></div>

  <button class="button" id="lobbyContinue" disabled>
    CONTINUE
  </button>

</div>

<!-- ===== PRE GAME ===== -->
<div id="pre-game" class="screen">

  <h2>GAME READY</h2>

  <div id="instructions">
    <p>Press START to begin the match</p>
  </div>

  <button class="button" id="startGameBtn">
    START
  </button>

  <div class="role-buttons" id="roleButtons">
    <button>WIREFRAME</button>
    <button>PROTOTYPE</button>
    <button>VISUALIZE</button>
  </div>

</div>

<!-- ===== GAME ===== -->
<div id="game-screen" class="screen">
  <h2>GAME RUNNING</h2>
  <canvas id="game"></canvas>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let lobby = null;

/* ===== NAV ===== */
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ===== START FLOW ===== */
document.getElementById("startContinue").onclick = () => {
  show("lobby-screen");
  socket.emit("resetLobby");
};

/* ===== CONTINUE FROM LOBBY ===== */
document.getElementById("lobbyContinue").onclick = () => {
  show("pre-game");
};

/* ===== START GAME ===== */
document.getElementById("startGameBtn").onclick = () => {
  document.getElementById("instructions").style.display = "none";
  document.getElementById("roleButtons").style.display = "block";

  show("game-screen");
  startGame();
};

/* ===== STATE ===== */
socket.on("state", (s) => {

  lobby = s.lobby;

  const count = Object.values(lobby.players).filter(Boolean).length;

  document.getElementById("lobbyContinue").disabled = count !== 3;

  updatePlayers(lobby.players);
});

/* ===== PLAYERS ===== */
function updatePlayers(p) {
  document.getElementById("players").innerHTML = `
    <div class="player">
      <img src="designer.png">
      <div class="player-name">Designer<br>${p.designer?.name || "❌"}</div>
    </div>
    <div class="player">
      <img src="developer.png">
      <div class="player-name">Developer<br>${p.developer?.name || "❌"}</div>
    </div>
    <div class="player">
      <img src="testengineer.png">
      <div class="player-name">Test Engineer<br>${p.tester?.name || "❌"}</div>
    </div>
  `;
}

/* ===== GAME ===== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight * 0.6;
}
window.addEventListener("resize", resize);

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  requestAnimationFrame(draw);
}

function startGame() {
  resize();
  draw();
}
</script>

</body>
</html>
