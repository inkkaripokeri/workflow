<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow Mobile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
  text-align: center;
}

/* ================= SCREEN ================= */
.screen {
  display: none;
  padding: 20px;
  height: 100vh;              /* 🔥 täyttää ruudun */
  box-sizing: border-box;
}

.active {
  display: flex;              /* 🔥 flex layout */
  flex-direction: column;
  justify-content: space-between; /* 🔥 jakaa tilan */
  align-items: center;
}

/* ================= TITLE ================= */
h1 {
  font-size: 24px;            /* 🔥 pienempi että mahtuu */
  margin-bottom: 16px;
  letter-spacing: 2px;
}

/* ================= ROLE CARD ================= */
.role-card {
  width: 200px;
  max-width: 90%;
  margin: 10px auto 20px auto;
  border-radius: 24px;
  overflow: hidden;
}

.role-card img {
  height: 20vh;
  max-height: 180px;
  width: auto;

  border-radius: 24px;
  display: block;
  margin: 0 auto;
}

/* ================= ROLE SELECT ================= */
.role {
  margin-bottom: 10px;        /* 🔥 pienempi väli */
  cursor: pointer;
}

.role-title {
  font-size: 18px;            /* 🔥 vähän pienempi */
  margin-bottom: 6px;
  letter-spacing: 1px;
}

/* 🔥 TÄRKEIN: skaalaa korkeuden mukaan */
.role img {
  height: 18vh;               /* 🔥 skaalaa ruudun mukaan */
  max-height: 180px;
  width: auto;

  border-radius: 24px;
  transition: 0.2s;
}

/* ROLE COLORS (match lobby) */
.role.designer img {
  border: 6px solid #f39c12;
}

.role.developer img {
  border: 6px solid #6c5ce7;
}

.role.tester img {
  border: 6px solid #00b894;
}

.role:hover img {
  transform: scale(1.05);
}

.role-card.designer img {
  border: 6px solid #f39c12;
}

.role-card.developer img {
  border: 6px solid #6c5ce7;
}

.role-card.tester img {
  border: 6px solid #00b894;
}

/* ================= INPUT ================= */
.input {
  width: 80%;
  max-width: 300px;
  padding: 14px;
  margin: 12px 0;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

/* ================= BUTTON ================= */
.button {
  margin-top: 20px;
  padding: 16px 50px;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  background: transparent;
  color: #fff;
  border: 2px solid #ff8c00;
  border-radius: 12px;
  cursor: pointer;
}

/* ================= GAME ID BOXES ================= */
.game-id-inputs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 16px 0;
}

.input-title {
  font-size: 16px;
  letter-spacing: 2px;
  margin-top: 10px;
  margin-bottom: 6px;
  opacity: 0.8;
}  
  
.digit-input {
  width: 50px;
  height: 60px;

  text-align: center;
  font-size: 28px;
  font-weight: 700;

  border-radius: 10px;
  border: none;

  background: #2a2a2a;
  color: #fff;
}
  
.button:hover {
  background: rgba(255,140,0,0.2);
}
</style>
</head>

<body>

<!-- ROLE SELECT -->
<div id="role-screen" class="screen active">

  <h1>Select Your Role</h1>
  
  <div class="role designer" onclick="selectRole('designer')">
    
    <img src="designer.png">
    <div class="role-title">DESIGNER</div>
    
  </div>
  
  <div class="role developer" onclick="selectRole('developer')">
    
    <img src="developer.png">
    <div class="role-title">DEVELOPER</div>
    
  </div>

  <div class="role tester" onclick="selectRole('tester')">
    
    <img src="testengineer.png">
    <div class="role-title">TEST ENGINEER</div>
    
  </div>

</div>

<!-- JOIN -->
<div id="join-screen" class="screen">

  <h1 id="roleTitle">JOIN GAME</h1>

  <div class="role-card" id="roleCard"></div>

  <div class="input-title">Game ID</div>
  <div id="gameIdInputs" class="game-id-inputs">
    <input maxlength="1" class="digit-input">
    <input maxlength="1" class="digit-input">
    <input maxlength="1" class="digit-input">
    <input maxlength="1" class="digit-input">
  </div>
  <br>
  <input class="input" id="nameInput" placeholder="YOUR NAME">
  <br>

  <button class="button" onclick="joinGame()">JOIN</button>

</div>

<!-- WAITING / READY -->
<div id="waiting-screen" class="screen">
  <h1 id="waitingTitle">WAITING...</h1>

  <div class="role-card" id="waitingCard"></div>

  <div id="waitingName"></div>
  <div id="waitingText">Waiting for players...</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let role = null;
let playerName = null;

/* SCREEN SWITCH */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ROLE SELECT */
function selectRole(selectedRole) {
  role = selectedRole;

  const roleTitleMap = {
    designer: "Designer",
    developer: "Developer",
    tester: "Test Engineer"
  };

  document.getElementById("roleTitle").textContent =
    "Join as " + roleTitleMap[role];

  document.getElementById("roleCard").className = `role-card ${role}`;

  document.getElementById("roleCard").innerHTML =
    `<img src="${role === "tester" ? "testengineer.png" : role + ".png"}">`;

  showScreen("join-screen");showScreen("join-screen");
  
}

/* JOIN */
function joinGame() {

  // 🔥 MUUTETTU: haetaan 4 inputista
  const gameId = Array.from(document.querySelectorAll(".digit-input"))
    .map(i => i.value)
    .join("");

  const name = document.getElementById("nameInput").value;

  if (!role || gameId.length !== 4 || !name) {
    alert("Fill all fields correctly");
    return;
  }

  playerName = name;

  socket.emit("join", {
    code: gameId,
    role,
    name
  });
}

/* JOIN RESULT */
socket.on("joinResult", (res) => {

  if (!res.ok) {
    alert(res.msg);
    return;
  }

  document.getElementById("waitingCard").className = `role-card ${role}`;

  document.getElementById("waitingCard").innerHTML =
    `<img src="${role === "tester" ? "testengineer.png" : role + ".png"}">`;

  document.getElementById("waitingName").textContent = playerName;

  document.getElementById("waitingTitle").textContent =
    role.toUpperCase();

  showScreen("waiting-screen");
});

/* STATE FROM SERVER */
socket.on("state", (s) => {

  if (!s.gameState) return;

  if (s.gameState === "waiting") {
    document.getElementById("waitingText").textContent =
      "Waiting for players...";
  }

  if (s.gameState === "ready") {
    document.getElementById("waitingText").textContent =
      "Waiting for the game to start...";
  }

  if (s.gameState === "running") {
    document.getElementById("waitingText").textContent =
      "Game starting...";
  }

  if (s.gameState === "gameover") {
    document.getElementById("waitingText").textContent =
      "GAME OVER";
  }
});

/* ================= GAME ID INPUT LOGIC ================= */

const inputs = document.querySelectorAll(".digit-input");

inputs.forEach((input, i) => {

  input.addEventListener("input", (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, "");

    if (e.target.value && i < inputs.length - 1) {
      inputs[i + 1].focus();
    }
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && i > 0) {
      inputs[i - 1].focus();
    }
  });

});

</script>

</body>
</html>
