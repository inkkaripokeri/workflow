<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taskflow Mobile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
  text-align: center;
}

/* ===== COMMON ===== */
.screen {
  display: none;
  padding: 40px 20px;
}

.active {
  display: block;
}

h1 {
  font-size: 36px;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

/* ===== ROLE CARD ===== */
.role-card {
  width: 260px;
  max-width: 90%;
  margin: 10px auto 20px auto;
  border-radius: 24px;
  overflow: hidden;
}

.role-card img {
  width: 100%;
  display: block;
  border-radius: 24px;
}

/* ===== ROLE SELECT ===== */
.role {
  margin-bottom: 40px;
  cursor: pointer;
}

.role-title {
  font-size: 22px;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.role img {
  width: 260px;
  max-width: 90%;
  border-radius: 24px;
  transition: 0.2s;
}

.role:hover img {
  transform: scale(1.05);
}

/* ===== INPUT ===== */
.input {
  width: 80%;
  max-width: 300px;
  padding: 14px;
  margin: 12px 0;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

/* ===== BUTTON ===== */
.button {
  margin-top: 20px;
  padding: 16px 50px;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  background: transparent;
  color: #fff;
  border: 2px solid #ff8c00;
  border-radius: 12px;
  cursor: pointer;
}

.button:hover {
  background: rgba(255,140,0,0.2);
}

/* ===== WAITING ===== */
#waiting {
  font-size: 22px;
  opacity: 0.8;
}
</style>
</head>

<body>

<!-- ===== ROLE SELECT ===== -->
<div id="role-screen" class="screen active">

  <h1>SELECT ROLE</h1>

  <div class="role" onclick="selectRole('developer')">
    <div class="role-title">DEVELOPER</div>
    <img src="developer.png">
  </div>

  <div class="role" onclick="selectRole('tester')">
    <div class="role-title">TEST ENGINEER</div>
    <img src="testengineer.png">
  </div>

  <div class="role" onclick="selectRole('designer')">
    <div class="role-title">DESIGNER</div>
    <img src="designer.png">
  </div>

</div>

<!-- ===== JOIN ===== -->
<div id="join-screen" class="screen">

  <h1 id="roleTitle">JOIN GAME</h1>

  <div class="role-card" id="roleCard"></div>

  <input class="input" id="gameIdInput" placeholder="GAME ID" maxlength="4">
  <br>
  <input class="input" id="nameInput" placeholder="YOUR NAME">
  <br>

  <button class="button" onclick="joinGame()">JOIN</button>

</div>

<!-- ===== WAITING ===== -->
<div id="waiting-screen" class="screen">
  <h1 id="waitingTitle">WAITING...</h1>

  <div class="role-card" id="waitingCard"></div>

  <div id="waitingName"></div>
  <div id="waitingText">Waiting for players...</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let role = null;
let playerName = null;

/* ===== SCREEN SWITCH ===== */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ===== ROLE SELECT ===== */
function selectRole(selectedRole) {
  role = selectedRole;

  const roleTitleMap = {
    designer: "DESIGNER",
    developer: "DEVELOPER",
    tester: "TEST ENGINEER"
  };

  document.getElementById("roleTitle").textContent =
    "JOIN AS " + roleTitleMap[role];

  document.getElementById("roleCard").innerHTML =
    `<img src="${role === "tester" ? "testengineer.png" : role + ".png"}">`;

  showScreen("join-screen");
}

/* ===== JOIN ===== */
function joinGame() {

  const gameId = document.getElementById("gameIdInput").value;
  const name = document.getElementById("nameInput").value;

  if (!role || !gameId || !name) {
    alert("Fill all fields");
    return;
  }

  playerName = name;

  socket.emit("join", {
    code: gameId,
    role,
    name
  });
}

/* ===== JOIN RESULT ===== */
socket.on("joinResult", (res) => {

  if (!res.ok) {
    alert(res.msg);
    return;
  }

  document.getElementById("waitingCard").innerHTML =
    `<img src="${role === "tester" ? "testengineer.png" : role + ".png"}">`;

  document.getElementById("waitingName").textContent = playerName;

  document.getElementById("waitingTitle").textContent =
    role.toUpperCase();

  showScreen("waiting-screen");
});

/* ===== STATE (future game sync) ===== */
socket.on("state", (s) => {
  if (s.gameState === "running") {
    // myöhemmin game screen
  }
});

</script>

</body>
</html>
