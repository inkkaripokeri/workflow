<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow Mobile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
/* (CSS unchanged) */
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
  text-align: center;
}

.screen { display: none; padding: 20px; height: 100vh; box-sizing: border-box; }
.active { display: flex; flex-direction: column; justify-content: space-between; align-items: center; }

h1 { font-size: 24px; margin-bottom: 12px; letter-spacing: 2px; }

.role-card { width: 200px; max-width: 90%; margin: 10px auto 20px auto; border-radius: 24px; overflow: visible; }
.role-card img { height: 20vh; max-height: 180px; width: auto; border-radius: 24px; display: block; margin: 0 auto; }

.role { margin-bottom: 10px; cursor: pointer; }
.role-title { font-size: 18px; margin-bottom: 6px; letter-spacing: 1px; }

.role img { height: 18vh; max-height: 180px; width: auto; border-radius: 24px; transition: 0.2s; }

.role.designer img { border: 6px solid #f39c12; }
.role.developer img { border: 6px solid #6c5ce7; }
.role.tester img { border: 6px solid #00b894; }

.role:hover img { transform: scale(1.05); }

.input { width: 80%; max-width: 300px; padding: 14px; margin: 12px 0; font-size: 18px; border-radius: 10px; border: none; text-align: center; }

.button { margin-top: 20px; padding: 16px 50px; font-size: 20px; font-weight: 700; letter-spacing: 2px; background: transparent; color: #fff; border: 2px solid #ff8c00; border-radius: 12px; cursor: pointer; }

.game-id-inputs { display: flex; justify-content: center; gap: 10px; margin: 16px 0; }

.input-title { font-size: 18px; letter-spacing: 2px; margin-top: 10px; margin-bottom: 1px; }

.digit-input { width: 30px; height: 50px; text-align: center; font-size: 34px; border-radius: 10px; border: none; background: #2a2a2a; color: #fff; }

#taskButtons { display: flex; flex-direction: column; gap: 10px; width: 80%; max-width: 300px; margin: 40px auto; }
.task-btn { padding: 14px; font-size: 16px; border-radius: 12px; border: none; color: #fff; cursor: pointer; }

</style>
</head>

<body>

<!-- ROLE SELECT -->
<div id="role-screen" class="screen active">
  <h1>Select Your Role</h1>

  <div class="role designer" onclick="selectRole('designer')">
    <img src="designer.png">
    <div class="role-title">DESIGNER</div>
  </div>

  <div class="role developer" onclick="selectRole('developer')">
    <img src="developer.png">
    <div class="role-title">DEVELOPER</div>
  </div>

  <div class="role tester" onclick="selectRole('tester')">
    <img src="testengineer.png">
    <div class="role-title">TEST ENGINEER</div>
  </div>
</div>

<!-- JOIN -->
<div id="join-screen" class="screen">
  <h1 id="roleTitle">JOIN GAME</h1>

  <div class="role-card" id="roleCard"></div>

  <div class="input-title">Game ID</div>
  <div class="game-id-inputs">
    <input class="digit-input" maxlength="1">
    <input class="digit-input" maxlength="1">
    <input class="digit-input" maxlength="1">
    <input class="digit-input" maxlength="1">
  </div>

  <div class="input-title">Your name</div>
  <input class="input" id="nameInput">

  <button class="button" onclick="joinGame()">JOIN</button>
</div>

<!-- WAITING -->
<div id="waiting-screen" class="screen">
  <h1 id="waitingTitle"></h1>

  <div class="role-card" id="waitingCard"></div>
  <div id="waitingName"></div>

  <div id="gameControls" style="display:none; width:100%;">
    <div class="input-title">Your Tasks</div>
    <div id="taskButtons"></div>
  </div>

  <div id="waitingText">Waiting for teammates...</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let role = null;
let playerName = null;
let canShoot = true;
let gameRunning = false;

/* 🔥 UUSI: FORCE LEAVE HANDLER */
socket.on("forceLeave", () => {
  console.log("🚪 FORCED OUT BY SERVER");

  alert("Host restarted the game.\nPlease join again.");

  // 🔥 reset kaikki state
  role = null;
  playerName = null;
  gameRunning = false;
  canShoot = true;

  document.getElementById("taskButtons").innerHTML = "";
  document.getElementById("gameControls").style.display = "none";
  document.getElementById("waitingText").style.display = "block";

  // 🔥 takaisin alkuun
  showScreen("role-screen");
});

/* SCREEN SWITCH */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ROLE SELECT */
function selectRole(selectedRole) {
  role = selectedRole;

  document.getElementById("roleTitle").textContent = "Join as " + role;
  document.getElementById("roleCard").innerHTML =
    `<img src="${role === "tester" ? "testengineer.png" : role + ".png"}">`;

  showScreen("join-screen");
}

/* JOIN */
function joinGame() {
  const gameId = Array.from(document.querySelectorAll(".digit-input"))
    .map(i => i.value)
    .join("");

  const name = document.getElementById("nameInput").value;

  if (!role || gameId.length !== 4 || !name) {
    alert("Fill all fields correctly");
    return;
  }

  playerName = name;

  socket.emit("join", { code: gameId, role, name });
}

/* JOIN RESULT */
socket.on("joinResult", () => {
  showScreen("waiting-screen");
});

/* STATE */
socket.on("state", (s) => {

  if (!s.gameState) return;

  if (s.gameState === "running") {
    gameRunning = true;

    document.getElementById("waitingText").style.display = "none";
    document.getElementById("gameControls").style.display = "block";

    renderGameControls();
  }

  if (s.gameState === "gameover") {
    gameRunning = false;
    document.getElementById("waitingText").textContent = "GAME OVER";
  }
});

/* BUTTONS */
function renderGameControls() {
  const container = document.getElementById("taskButtons");
  container.innerHTML = "";

  ROLE_TASKS[role].forEach(task => {
    const btn = document.createElement("button");
    btn.className = "task-btn";
    btn.textContent = task;

    btn.onclick = () => {
      if (!canShoot || !gameRunning) return;

      canShoot = false;
      socket.emit("shoot", { role, task });

      setTimeout(() => canShoot = true, 300);
    };

    container.appendChild(btn);
  });
}

</script>

</body>
</html>
