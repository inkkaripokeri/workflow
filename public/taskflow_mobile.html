<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow Mobile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
  text-align: center;
}

/* ================= SCREEN ================= */
.screen {
  display: none;
  padding: 20px;
  height: 100vh;
  box-sizing: border-box;
}

.active {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
}

/* ================= TITLE ================= */
h1 {
  font-size: 24px;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

/* ================= ROLE CARD ================= */
.role-card {
  width: 200px;
  max-width: 90%;
  margin: 10px auto 20px auto;
  border-radius: 24px;
}

.role-card img {
  height: 20vh;
  max-height: 180px;
  border-radius: 24px;
}

/* ================= ROLE SELECT ================= */
.role {
  margin-bottom: 10px;
  cursor: pointer;
}

.role-title {
  font-size: 18px;
  margin-bottom: 6px;
}

.role img {
  height: 18vh;
  max-height: 180px;
  border-radius: 24px;
}

/* ROLE COLORS */
.role.designer img { border: 6px solid #f39c12; }
.role.developer img { border: 6px solid #6c5ce7; }
.role.tester img { border: 6px solid #00b894; }

.role-card.designer img { border: 6px solid #f39c12; }
.role-card.developer img { border: 6px solid #6c5ce7; }
.role-card.tester img { border: 6px solid #00b894; }

/* ================= INPUT ================= */
.input {
  width: 80%;
  max-width: 300px;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

/* ================= BUTTON ================= */
.button {
  margin-top: 20px;
  padding: 16px 50px;
  font-size: 20px;
  font-weight: 700;
  border: 2px solid #ff8c00;
  border-radius: 12px;
  background: transparent;
  color: #fff;
}

/* ================= WAITING ================= */
#waiting-screen {
  justify-content: flex-start;
  align-items: center;
  gap: 10px;
  padding-top: 40px;
}

#waitingName {
  font-size: 18px;
}

#waitingText {
  font-size: 24px;
  opacity: 0.6;
}

#waitingAnim {
  height: 12vh;
}

/* ================= GAME BUTTONS ================= */
#taskButtons {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 80%;
  max-width: 300px;
  margin: 20px auto;
}

.task-btn {
  padding: 18px;
  font-size: 16px;
  font-weight: 700;
  border-radius: 12px;
  border: none;
  color: #fff;
}

/* 🔥 TÄRKEIN LISÄYS */
#gameTitle {
  margin-top: 40px;
}
</style>
</head>
