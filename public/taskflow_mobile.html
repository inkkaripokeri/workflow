<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow Mobile</title>

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
  text-align: center;
}

/* ================= SCREEN ================= */
.screen {
  display: none;
  padding: 20px;
  height: 100vh;
  box-sizing: border-box;
}

.active {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
}

/* ================= ROLE SELECT ================= */
.role {
  margin-bottom: 12px;
  cursor: pointer;
}

.role-title {
  font-size: 18px;
  margin-top: 6px;
}

.role img {
  height: 18vh;
  max-height: 160px;
  border-radius: 20px;
}

/* COLORS */
.role.designer img { border: 6px solid #f39c12; }
.role.developer img { border: 6px solid #6c5ce7; }
.role.tester img { border: 6px solid #00b894; }

/* ================= JOIN ================= */
.role-card img {
  height: 120px;
  border-radius: 20px;
}

.input-title {
  font-size: 16px;
  margin-top: 10px;
}

.game-id-inputs {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.digit-input {
  width: 30px;
  height: 50px;
  font-size: 24px;
  text-align: center;
  border-radius: 8px;
  border: none;
  background: #2a2a2a;
  color: #fff;
}

.input {
  padding: 12px;
  width: 80%;
  max-width: 280px;
  border-radius: 8px;
  border: none;
}

.button {
  margin-top: 15px;
  padding: 14px 40px;
  border-radius: 10px;
  border: 2px solid #ff8c00;
  background: transparent;
  color: white;
}

/* ================= GAME ================= */
#taskButtons {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 80%;
  max-width: 300px;
}

.task-btn {
  padding: 18px;
  font-weight: bold;
  border-radius: 10px;
  border: none;
  color: white;
  transition: 0.1s;
}

.task-btn:active {
  transform: scale(0.96);
}

#gameTitle {
  margin-top: 40px;
}
</style>
</head>

<body>

<!-- ROLE SELECT -->
<div id="role-screen" class="screen active">
  <h1>Select Your Role</h1>

  <div class="role designer" onclick="selectRole('designer')">
    <img src="designer.png">
    <div class="role-title">DESIGNER</div>
  </div>

  <div class="role developer" onclick="selectRole('developer')">
    <img src="developer.png">
    <div class="role-title">DEVELOPER</div>
  </div>

  <div class="role tester" onclick="selectRole('tester')">
    <img src="testengineer.png">
    <div class="role-title">TEST ENGINEER</div>
  </div>
</div>

<!-- JOIN -->
<div id="join-screen" class="screen">
  <h1 id="roleTitle">JOIN GAME</h1>

  <div id="roleCard"></div>

  <div class="input-title">Game ID</div>
  <div class="game-id-inputs">
    <input class="digit-input">
    <input class="digit-input">
    <input class="digit-input">
    <input class="digit-input">
  </div>

  <div class="input-title">Your name</div>
  <input class="input" id="nameInput">

  <button class="button" onclick="joinGame()">JOIN</button>
</div>

<!-- WAITING / GAME -->
<div id="waiting-screen" class="screen">
  <h1 id="waitingTitle"></h1>

  <div id="waitingText">Waiting for teammates...</div>

  <div id="gameControls" style="display:none;">
    <div id="gameTitle">Your Tasks</div>
    <div id="taskButtons"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let role = null;
let canShoot = true;
let gameRunning = false;

const shootSound = new Audio("shoot.mp3");

const ROLE_TASKS = {
  designer: ["WIREFRAME", "PROTOTYPE", "USER RESEARCH"],
  developer: ["NEW FEATURE", "BUGFIX", "REFACTOR"],
  tester: ["SMOKE TEST", "UNIT TEST", "BUG REPORT"]
};

/* SCREEN SWITCH */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ROLE SELECT */
function selectRole(r) {
  role = r;

  document.getElementById("roleCard").innerHTML =
    `<img src="${r === "tester" ? "testengineer.png" : r + ".png"}">`;

  showScreen("join-screen");
}

/* JOIN */
function joinGame() {

  const code = Array.from(document.querySelectorAll(".digit-input"))
    .map(i => i.value)
    .join("");

  const name = document.getElementById("nameInput").value;

  socket.emit("join", { code, role, name });
}

/* JOIN RESULT */
socket.on("joinResult", (res) => {
  if (!res.ok) return;
  showScreen("waiting-screen");
});

/* STATE */
socket.on("state", (s) => {

  if (s.gameState === "running") {
    gameRunning = true;

    document.getElementById("waitingText").style.display = "none";
    document.getElementById("gameControls").style.display = "block";

    renderGameControls();
  }

  if (s.gameState === "gameover") {
    document.getElementById("waitingText").textContent = "GAME OVER";
  }
});

/* GAME BUTTONS */
function renderGameControls() {
  const container = document.getElementById("taskButtons");
  container.innerHTML = "";

  ROLE_TASKS[role].forEach(task => {

    const btn = document.createElement("button");
    btn.className = "task-btn";
    btn.textContent = task;

    if (role === "designer") btn.style.background = "#f39c12";
    if (role === "developer") btn.style.background = "#6c5ce7";
    if (role === "tester") btn.style.background = "#00b894";

    btn.onclick = () => {

      if (!canShoot || !gameRunning) return;

      canShoot = false;

      shootSound.currentTime = 0;
      shootSound.play();

      btn.style.opacity = "0.5";

      socket.emit("shoot", { role, task });

      setTimeout(() => {
        canShoot = true;
        btn.style.opacity = "1";
      }, 300);
    };

    container.appendChild(btn);
  });
}

</script>

</body>
</html>
