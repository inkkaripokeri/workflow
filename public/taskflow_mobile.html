<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow Mobile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap">

<style>
body {
  margin: 0;
  background: #05060c;
  color: #fff;
  font-family: "Roboto Condensed", Arial, sans-serif;
  text-align: center;
}

/* ================= SCREEN ================= */
.screen {
  display: none;
  padding: 20px;
  height: 100vh;
  box-sizing: border-box;
}

.active {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
}

/* ================= TITLE ================= */
h1 {
  font-size: 24px;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

/* ================= ROLE CARD ================= */
.role-card {
  width: 200px;
  max-width: 90%;
  margin: 10px auto 20px auto;
  border-radius: 24px;
}

.role-card img {
  height: 20vh;
  max-height: 180px;
  border-radius: 24px;
}

/* ================= ROLE SELECT ================= */
.role {
  margin-bottom: 10px;
  cursor: pointer;
}

.role-title {
  font-size: 18px;
  margin-bottom: 6px;
}

.role img {
  height: 18vh;
  max-height: 180px;
  border-radius: 24px;
}

/* ROLE COLORS */
.role.designer img { border: 6px solid #f39c12; }
.role.developer img { border: 6px solid #6c5ce7; }
.role.tester img { border: 6px solid #00b894; }

.role-card.designer img { border: 6px solid #f39c12; }
.role-card.developer img { border: 6px solid #6c5ce7; }
.role-card.tester img { border: 6px solid #00b894; }

/* ================= INPUT ================= */
.input {
  width: 80%;
  max-width: 300px;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

/* ================= BUTTON ================= */
.button {
  margin-top: 20px;
  padding: 16px 50px;
  font-size: 20px;
  font-weight: 700;
  border: 2px solid #ff8c00;
  border-radius: 12px;
  background: transparent;
  color: #fff;
}

/* ================= WAITING ================= */
#waiting-screen {
  justify-content: flex-start;
  align-items: center;
  gap: 10px;
  padding-top: 40px;
}

#waitingName {
  font-size: 18px;
}

#waitingText {
  font-size: 24px;
  opacity: 0.6;
}

#waitingAnim {
  height: 12vh;
}

/* ================= GAME BUTTONS ================= */
#taskButtons {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 80%;
  max-width: 300px;
  margin: 20px auto;
}

.task-btn {
  padding: 18px;
  font-size: 16px;
  font-weight: 700;
  border-radius: 12px;
  border: none;
  color: #fff;
  transition: 0.1s;
}

.task-btn:active {
  transform: scale(0.97);
}

.task-btn.disabled {
  opacity: 0.3;
  pointer-events: none;
}

/* 🔥 spacing */
#gameTitle {
  margin-top: 40px;
}
</style>
</head>

<body>

<div id="waiting-screen" class="screen active">
  <h1 id="waitingTitle"></h1>

  <div class="role-card" id="waitingCard"></div>

  <div id="waitingName"></div>

  <video id="waitingAnim" autoplay loop muted playsinline>
    <source src="Typing.webm" type="video/webm">
  </video>

  <div id="gameControls" style="display:none; width:100%;">
    <div id="gameTitle" class="input-title">Your Tasks</div>
    <div id="taskButtons"></div>
  </div>

  <div id="waitingText">Waiting for teammates...</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let role = null;
let playerName = null;
let canShoot = true;
let gameRunning = false;

/* 🔊 SOUND */
const shootSound = new Audio("shoot.mp3");
shootSound.volume = 0.5;

const ROLE_TASKS = {
  designer: ["WIREFRAME", "PROTOTYPE", "USER RESEARCH"],
  developer: ["NEW FEATURE", "BUGFIX", "REFACTOR"],
  tester: ["SMOKE TEST", "UNIT TEST", "BUG REPORT"]
};

/* STATE */
socket.on("state", (s) => {

  if (!s.gameState) return;

  if (s.gameState === "running") {
    gameRunning = true;

    document.getElementById("waitingText").style.display = "none";
    document.getElementById("waitingAnim").style.display = "none";
    document.getElementById("gameControls").style.display = "block";

    renderGameControls();
  } else {
    gameRunning = false;
  }

  if (s.gameState === "gameover") {
    document.getElementById("waitingText").textContent = "GAME OVER";
  }
});

/* 🔥 GAME BUTTONS */
function renderGameControls() {
  const container = document.getElementById("taskButtons");
  container.innerHTML = "";

  ROLE_TASKS[role].forEach(task => {

    const btn = document.createElement("button");
    btn.className = "task-btn";
    btn.textContent = task;

    if (role === "designer") btn.style.background = "#f39c12";
    if (role === "developer") btn.style.background = "#6c5ce7";
    if (role === "tester") btn.style.background = "#00b894";

    btn.onclick = () => {

      if (!canShoot || !gameRunning) return;

      canShoot = false;

      // 🔊 sound
      shootSound.currentTime = 0;
      shootSound.play();

      // 🔥 visual feedback
      btn.style.opacity = "0.5";

      socket.emit("shoot", { role, task });

      setTimeout(() => {
        canShoot = true;
        btn.style.opacity = "1";
      }, 300);
    };

    container.appendChild(btn);
  });
}
</script>

</body>
</html>
