<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let role = null;
let playerName = null;

let canShoot = true;
let gameRunning = false;

const shootSound = new Audio("shoot.mp3");
shootSound.volume = 0.5;

const ROLE_TASKS = {
designer: ["WIREFRAME", "PROTOTYPE", "USER RESEARCH"],
developer: ["NEW FEATURE", "BUGFIX", "REFACTOR"],
tester: ["SMOKE TEST", "UNIT TEST", "BUG REPORT"]
};

/* SCREEN SWITCH */
function showScreen(id) {
document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* 🔥 INPUT SETUP (BULLETPROOF FIX) */
function setupGameIdInputs() {

const inputs = document.querySelectorAll(".digit-input");

/* 🔥 RESET KENTÄT */
inputs.forEach(i => i.value = "");

inputs.forEach((input, i) => {

input.oninput = (e) => {

e.target.value = e.target.value.replace(/[^0-9]/g, "");

if (e.target.value) {
if (i < inputs.length - 1) {
inputs[i + 1].focus();
} else {
document.getElementById("nameInput").focus();
}
}
};

input.onkeydown = (e) => {
if (e.key === "Backspace" && !input.value && i > 0) {
inputs[i - 1].focus();
}
};

});

/* 🔥 fokus ekaan */
if (inputs[0]) inputs[0].focus();
}

/* ROLE SELECT */
function selectRole(selectedRole) {

role = selectedRole;

const roleTitleMap = {
designer: "Designer",
developer: "Developer",
tester: "Test Engineer"
};

document.getElementById("roleTitle").textContent =
"Join as " + roleTitleMap[role];

document.getElementById("roleCard").className = `role-card ${role}`;

document.getElementById("roleCard").innerHTML =
`<img src="${role === "tester" ? "testengineer.png" : role + ".png"}">`;

showScreen("join-screen");

/* 🔥 VARMA INIT */
setTimeout(setupGameIdInputs, 30);
}

/* JOIN */
function joinGame() {

const gameId = Array.from(document.querySelectorAll(".digit-input"))
.map(i => i.value)
.join("");

const name = document.getElementById("nameInput").value;

if (!role || gameId.length !== 4 || !name) {
alert("Fill all fields correctly");
return;
}

playerName = name;

socket.emit("join", {
code: gameId,
role,
name
});
}

/* JOIN RESULT */
socket.on("joinResult", (res) => {

if (!res.ok) {
alert(res.msg);
return;
}

document.getElementById("waitingCard").className = `role-card ${role}`;

document.getElementById("waitingCard").innerHTML =
`<img src="${role === "tester" ? "testengineer.png" : role + ".png"}">`;

const roleLabelMap = {
designer: "DESIGNER",
developer: "DEVELOPER",
tester: "TEST ENGINEER"
};

document.getElementById("waitingName").textContent = roleLabelMap[role];
document.getElementById("waitingTitle").textContent = playerName;

showScreen("waiting-screen");
});

/* STATE */
socket.on("state", (s) => {

if (!s.gameState) return;

if (s.gameState === "waiting") {
gameRunning = false;
document.getElementById("waitingText").textContent =
"Waiting for teammates...";
}

if (s.gameState === "ready") {
gameRunning = false;
document.getElementById("waitingText").textContent =
"Waiting for the game to start...";
}

if (s.gameState === "running") {

gameRunning = true;

if (!document.getElementById("gameControls").dataset.started) {

document.getElementById("gameControls").dataset.started = "true";

const text = document.getElementById("waitingText");
if (text) text.style.display = "none";

const anim = document.getElementById("waitingAnim");
if (anim) anim.style.display = "none";

const controls = document.getElementById("gameControls");
if (controls) controls.style.display = "block";

renderGameControls();
}
}

if (s.gameState === "gameover") {
gameRunning = false;
document.getElementById("waitingText").textContent =
"GAME OVER";
}
});

/* GAME BUTTONS */
function renderGameControls() {

const container = document.getElementById("taskButtons");
container.innerHTML = "";

ROLE_TASKS[role].forEach(task => {

const btn = document.createElement("button");
btn.className = "task-btn";
btn.textContent = task;

if (role === "designer") btn.style.background = "#f39c12";
if (role === "developer") btn.style.background = "#6c5ce7";
if (role === "tester") btn.style.background = "#00b894";

btn.onclick = () => {

if (!canShoot || !gameRunning) return;

canShoot = false;

shootSound.currentTime = 0;
shootSound.play();

btn.style.opacity = "0.5";

socket.emit("shoot", { role, task });

setTimeout(() => {
canShoot = true;
btn.style.opacity = "1";
}, 300);
};

container.appendChild(btn);
});
}

</script>
