<body style="background:red">

<input id="code" placeholder="Enter code">
<button onclick="join()">JOIN</button>

<div id="controls" style="display:none">
<button onclick="shoot('A')">Red A</button>
<button onclick="shoot('B')">Red B</button>
<button onclick="shoot('C')">Red C</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function join(){
  socket.emit("join", { code: code.value, color:"red" });
}

socket.on("joinResult", r=>{
  if(r.ok){
    controls.style.display="block";
  } else alert(r.msg);
});

function shoot(letter){
  socket.emit("shoot",{ color:"red", letter });
}
</script>
</body>
