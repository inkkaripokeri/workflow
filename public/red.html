<!DOCTYPE html>
<body style="background:red; color:white; font-family:Arial">

<div id="joinUI">
  <input id="name" placeholder="Your name"><br>
  <input id="code" placeholder="Code"><br>
  <button onclick="join()">JOIN</button>
</div>

<div id="gameUI" style="display:none">
  <h2 id="playerName"></h2>

  <button onclick="shoot('A')">Red A</button>
  <button onclick="shoot('B')">Red B</button>
  <button onclick="shoot('C')">Red C</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function join(){
  socket.emit("join", {
    code: code.value,
    color:"red",
    name: name.value || "Player"
  });
}

socket.on("joinResult", r=>{
  if(r.ok){
    joinUI.style.display="none";
    gameUI.style.display="block";
    playerName.textContent = r.name;
  } else {
    alert(r.msg);
  }
});

function shoot(letter){
  socket.emit("shoot",{ color:"red", letter });
}
</script>
</body>
