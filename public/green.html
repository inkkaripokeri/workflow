<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Green Controller</title>
</head>

<body style="background:green; color:white; font-family:Arial; margin:0; padding:20px;">

<div id="joinUI">
  <h2>GREEN PLAYER</h2>

  <input id="name" placeholder="Your name"><br><br>
  <input id="code" placeholder="Game code"><br><br>

  <button onclick="join()">JOIN</button>
</div>

<div id="gameUI" style="display:none">
  <h2 id="playerName"></h2>

  <button onclick="shoot('A')">Green A</button>
  <button onclick="shoot('B')">Green B</button>
  <button onclick="shoot('C')">Green C</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const joinUI = document.getElementById("joinUI");
const gameUI = document.getElementById("gameUI");
const playerName = document.getElementById("playerName");

function join(){
  socket.emit("join", {
    code: document.getElementById("code").value,
    name: document.getElementById("name").value || "Player",
    color: "green"
  });
}

socket.on("joinResult", (r)=>{
  if(r.ok){
    joinUI.style.display = "none";
    gameUI.style.display = "block";
    playerName.textContent = r.name;
  } else {
    alert(r.msg);
  }
});

function shoot(letter){
  socket.emit("shoot", { color:"green", letter });
}
</script>

</body>
</html>
