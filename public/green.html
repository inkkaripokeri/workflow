<!DOCTYPE html>
<body style="background:green; color:white; font-family:Arial">

<div id="joinUI">
  <input id="name" placeholder="Your name"><br>
  <input id="code" placeholder="Code"><br>
  <button onclick="join()">JOIN</button>
</div>

<div id="gameUI" style="display:none">
  <h2 id="playerName"></h2>

  <button onclick="shoot('A')">Green A</button>
  <button onclick="shoot('B')">Green B</button>
  <button onclick="shoot('C')">Green C</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function join(){
  socket.emit("join", {
    code: code.value,
    color:"green",
    name: name.value || "Player"
  });
}

socket.on("joinResult", r=>{
  if(r.ok){
    joinUI.style.display="none";
    gameUI.style.display="block";
    playerName.textContent = r.name;
  } else {
    alert(r.msg);
  }
});

function shoot(letter){
  socket.emit("shoot",{ color:"green", letter });
}
</script>
</body>
