<button onclick="shoot('A')">Green A</button>
<button onclick="shoot('B')">Green B</button>
<button onclick="shoot('C')">Green C</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function shoot(letter) {
  socket.emit("shoot", { color: "green", letter });
}
</script>
